<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offerte Generator – Duiven Installatietechniek</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root {
    --orange: #E8732A;
    --cyan: #7EDDD8;
    --dark: #1a1a1a;
    --mid: #2d2d2d;
    --surface: #242424;
    --border: #383838;
    --text: #f0f0f0;
    --muted: #888;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Barlow', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    background: var(--mid);
    border-bottom: 2px solid var(--orange);
    padding: 20px 40px;
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .logo-mark {
    width: 52px;
    height: 60px;
  }

  .brand h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 28px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #fff;
    line-height: 1;
  }

  .brand p {
    font-size: 12px;
    color: var(--cyan);
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 600;
    margin-top: 2px;
  }

  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 48px 24px;
  }

  .section-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--orange);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
    margin-bottom: 24px;
  }

  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
  }

  .grid-3 {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 18px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .field.full { grid-column: 1 / -1; }

  label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }

  input, textarea, select {
    background: var(--dark);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 15px;
    padding: 12px 14px;
    transition: border-color 0.2s;
    outline: none;
    width: 100%;
  }

  input:focus, textarea:focus, select:focus {
    border-color: var(--orange);
  }

  textarea {
    resize: vertical;
    min-height: 80px;
  }

  select option { background: var(--dark); }

  /* Regelitems */
  .regels-list { display: flex; flex-direction: column; gap: 10px; }

  .regel-row {
    display: grid;
    grid-template-columns: 2fr 80px 110px 110px 36px;
    gap: 10px;
    align-items: center;
  }

  .regel-row input {
    font-size: 14px;
    padding: 10px 12px;
  }

  .delete-btn {
    background: transparent;
    border: 1px solid #444;
    border-radius: 6px;
    color: #666;
    cursor: pointer;
    font-size: 16px;
    height: 38px;
    width: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .delete-btn:hover { border-color: #e05; color: #e05; }

  .add-btn {
    background: transparent;
    border: 1px dashed var(--border);
    border-radius: 8px;
    color: var(--muted);
    cursor: pointer;
    font-family: 'Barlow', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    padding: 12px;
    text-transform: uppercase;
    transition: all 0.2s;
    width: 100%;
    margin-top: 8px;
  }

  .add-btn:hover { border-color: var(--orange); color: var(--orange); }

  /* Totalen */
  .totalen {
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
  }

  .totalen-row {
    display: flex;
    gap: 32px;
    align-items: center;
  }

  .totalen-row span:first-child {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    min-width: 80px;
    text-align: right;
  }

  .totalen-row span:last-child {
    font-size: 16px;
    font-weight: 700;
    min-width: 110px;
    text-align: right;
  }

  .totalen-row.grand span:first-child { color: var(--orange); }
  .totalen-row.grand span:last-child { font-size: 22px; color: #fff; }

  /* Download button */
  .download-btn {
    background: linear-gradient(135deg, var(--orange), #d4631a);
    border: none;
    border-radius: 10px;
    color: #fff;
    cursor: pointer;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 3px;
    padding: 18px 48px;
    text-transform: uppercase;
    transition: all 0.2s;
    box-shadow: 0 4px 24px rgba(232,115,42,0.3);
  }

  .download-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(232,115,42,0.5);
  }

  .btn-row {
    display: flex;
    justify-content: center;
    padding-top: 12px;
  }

  .regel-header {
    display: grid;
    grid-template-columns: 2fr 80px 110px 110px 36px;
    gap: 10px;
    margin-bottom: 6px;
  }

  .regel-header span {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 12px;
  }

  @media (max-width: 640px) {
    .grid-2, .grid-3 { grid-template-columns: 1fr; }
    .regel-row { grid-template-columns: 1fr 60px 90px 90px 36px; }
  }
</style>
</head>
<body>

<header>
  <!-- SVG logo mark gebaseerd op het Duiven logo -->
  <svg class="logo-mark" viewBox="0 0 52 60" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="topGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#E8732A"/>
        <stop offset="100%" style="stop-color:#c4602a"/>
      </linearGradient>
      <linearGradient id="botGrad" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" style="stop-color:#a0dede"/>
        <stop offset="100%" style="stop-color:#7EDDD8"/>
      </linearGradient>
    </defs>
    <!-- bovenstuk (schuin dak) -->
    <polygon points="4,22 30,4 48,14 22,30" fill="url(#topGrad)"/>
    <!-- onderstuk (staande balk) -->
    <polygon points="22,30 48,14 48,52 22,58" fill="url(#botGrad)"/>
  </svg>
  <div class="brand">
    <h1>Duiven</h1>
    <p>Installatietechniek</p>
  </div>
</header>

<main>

  <div class="section-title">Klantgegevens</div>
  <div class="card">
    <div class="grid-2">
      <div class="field">
        <label>Naam / Bedrijf</label>
        <input type="text" id="klant-naam" placeholder="Jan de Vries">
      </div>
      <div class="field">
        <label>Contactpersoon</label>
        <input type="text" id="klant-contact" placeholder="Jan de Vries">
      </div>
      <div class="field">
        <label>Adres</label>
        <input type="text" id="klant-adres" placeholder="Voorbeeldstraat 1">
      </div>
      <div class="field">
        <label>Postcode &amp; Plaats</label>
        <input type="text" id="klant-postcode" placeholder="1234 AB Amsterdam">
      </div>
      <div class="field">
        <label>E-mail</label>
        <input type="email" id="klant-email" placeholder="info@voorbeeld.nl">
      </div>
      <div class="field">
        <label>Telefoon</label>
        <input type="tel" id="klant-telefoon" placeholder="+31 6 12345678">
      </div>
    </div>
  </div>

  <div class="section-title">Offerte details</div>
  <div class="card">
    <div class="grid-3">
      <div class="field">
        <label>Offertenummer</label>
        <input type="text" id="offerte-nr" placeholder="2026-001">
      </div>
      <div class="field">
        <label>Datum</label>
        <input type="date" id="offerte-datum">
      </div>
      <div class="field">
        <label>Geldig tot</label>
        <input type="date" id="offerte-geldig">
      </div>
      <div class="field full">
        <label>Projectomschrijving</label>
        <textarea id="offerte-omschrijving" placeholder="Bijv. installatie cv-ketel en loodgieterswerk woning..."></textarea>
      </div>
    </div>
  </div>

  <div class="section-title">Regelitems</div>
  <div class="card">
    <div class="regel-header">
      <span>Omschrijving</span>
      <span>Aantal</span>
      <span>Eenheidsprijs</span>
      <span>Totaal</span>
      <span></span>
    </div>
    <div class="regels-list" id="regels-list"></div>
    <button class="add-btn" onclick="addRegel()">+ Regel toevoegen</button>

    <div class="totalen">
      <div class="totalen-row">
        <span>Subtotaal</span>
        <span id="subtotaal">€ 0,00</span>
      </div>
      <div class="totalen-row">
        <span>BTW 21%</span>
        <span id="btw">€ 0,00</span>
      </div>
      <div class="totalen-row grand">
        <span>Totaal</span>
        <span id="totaal">€ 0,00</span>
      </div>
    </div>
  </div>

  <div class="section-title">Opmerkingen</div>
  <div class="card">
    <div class="field">
      <label>Extra opmerkingen / betalingsvoorwaarden</label>
      <textarea id="opmerkingen" placeholder="Betaling binnen 14 dagen na factuurdatum. Prijzen zijn exclusief BTW.">Betaling binnen 14 dagen na factuurdatum. Prijzen zijn exclusief BTW tenzij anders vermeld.</textarea>
    </div>
  </div>

  <div class="btn-row">
    <button class="download-btn" onclick="downloadPDF()">⬇ Offerte Downloaden</button>
  </div>

</main>

<script>
  // Zet standaard datum
  const today = new Date();
  document.getElementById('offerte-datum').value = today.toISOString().split('T')[0];
  const geldig = new Date(today);
  geldig.setDate(geldig.getDate() + 30);
  document.getElementById('offerte-geldig').value = geldig.toISOString().split('T')[0];

  // Auto offertenummer
  const nr = String(Math.floor(Math.random() * 900) + 100);
  document.getElementById('offerte-nr').value = `${today.getFullYear()}-${nr}`;

  let regelCount = 0;

  function addRegel(omschrijving='', aantal=1, prijs=0) {
    regelCount++;
    const id = regelCount;
    const list = document.getElementById('regels-list');
    const row = document.createElement('div');
    row.className = 'regel-row';
    row.id = `regel-${id}`;
    row.innerHTML = `
      <input type="text" placeholder="Bijv. Montage CV-ketel" value="${omschrijving}" oninput="berekenTotalen()">
      <input type="number" value="${aantal}" min="0.5" step="0.5" oninput="berekenTotalen()" style="text-align:center">
      <input type="number" value="${prijs}" min="0" step="0.01" placeholder="0.00" oninput="berekenTotalen()">
      <input type="text" id="totaal-${id}" value="€ 0,00" readonly style="background:#1a1a1a;color:#ccc;font-weight:600">
      <button class="delete-btn" onclick="deleteRegel(${id})">✕</button>
    `;
    list.appendChild(row);
    berekenTotalen();
  }

  function deleteRegel(id) {
    const row = document.getElementById(`regel-${id}`);
    if (row) row.remove();
    berekenTotalen();
  }

  function berekenTotalen() {
    const rows = document.querySelectorAll('.regel-row');
    let subtotaal = 0;
    rows.forEach(row => {
      const inputs = row.querySelectorAll('input');
      const aantal = parseFloat(inputs[1].value) || 0;
      const prijs = parseFloat(inputs[2].value) || 0;
      const totaal = aantal * prijs;
      inputs[3].value = formatEuro(totaal);
      subtotaal += totaal;
    });
    const btw = subtotaal * 0.21;
    const totaal = subtotaal + btw;
    document.getElementById('subtotaal').textContent = formatEuro(subtotaal);
    document.getElementById('btw').textContent = formatEuro(btw);
    document.getElementById('totaal').textContent = formatEuro(totaal);
  }

  function formatEuro(val) {
    return '€ ' + val.toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g, '.');
  }

  // Standaard 3 regels
  addRegel('', 1, 0);
  addRegel('', 1, 0);
  addRegel('', 1, 0);

  function formatDatum(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr);
    return d.toLocaleDateString('nl-NL', { day: 'numeric', month: 'long', year: 'numeric' });
  }

  async function downloadPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: 'mm', format: 'a4' });
    const W = 210, H = 297;
    const margin = 18;

    // Kleuren
    const orange = [232, 115, 42];
    const cyan = [126, 221, 216];
    const dark = [26, 26, 26];
    const mid = [45, 45, 45];
    const light = [240, 240, 240];
    const muted = [130, 130, 130];

    // Achtergrond
    doc.setFillColor(...dark);
    doc.rect(0, 0, W, H, 'F');

    // Header balk
    doc.setFillColor(...mid);
    doc.rect(0, 0, W, 38, 'F');
    doc.setFillColor(...orange);
    doc.rect(0, 36, W, 2, 'F');

    // Logo mark (vereenvoudigd als polygonen)
    // Dak (oranje driehoek/vlak)
    doc.setFillColor(...orange);
    doc.triangle(margin, 28, margin+14, 8, margin+26, 14, 'F');
    // Staande balk (cyan)
    doc.setFillColor(...cyan);
    doc.rect(margin+14, 14, 12, 20, 'F');

    // Bedrijfsnaam
    doc.setTextColor(...light);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(22);
    doc.text('DUIVEN', margin + 32, 20);
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(9);
    doc.setTextColor(...cyan);
    doc.text('INSTALLATIETECHNIEK', margin + 32, 27);

    // Bedrijfsgegevens rechts
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(8);
    doc.setTextColor(...muted);
    doc.text('Duiven Installatie & Service', W - margin, 10, { align: 'right' });
    doc.text('Koolmeesstraat 4', W - margin, 15, { align: 'right' });
    doc.text('6921 KK Duiven', W - margin, 20, { align: 'right' });
    doc.text('KVK: 99908700', W - margin, 25, { align: 'right' });

    // OFFERTE titel
    doc.setFillColor(...orange);
    doc.rect(margin, 44, 50, 10, 'F');
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(13);
    doc.setTextColor(255, 255, 255);
    doc.text('OFFERTE', margin + 3, 51.5);

    // Offerte meta
    const ofNr = document.getElementById('offerte-nr').value;
    const ofDatum = formatDatum(document.getElementById('offerte-datum').value);
    const ofGeldig = formatDatum(document.getElementById('offerte-geldig').value);

    doc.setFont('helvetica', 'normal');
    doc.setFontSize(8);
    doc.setTextColor(...muted);
    doc.text(`Nr: ${ofNr}`, W - margin, 47, { align: 'right' });
    doc.text(`Datum: ${ofDatum}`, W - margin, 52, { align: 'right' });
    doc.text(`Geldig tot: ${ofGeldig}`, W - margin, 57, { align: 'right' });

    // Klantblok
    let y = 64;
    doc.setFillColor(35, 35, 35);
    doc.roundedRect(margin, y, 80, 36, 2, 2, 'F');
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(7);
    doc.setTextColor(...orange);
    doc.text('KLANTGEGEVENS', margin + 4, y + 6);

    doc.setFont('helvetica', 'bold');
    doc.setFontSize(9);
    doc.setTextColor(...light);
    const klantNaam = document.getElementById('klant-naam').value || '—';
    doc.text(klantNaam, margin + 4, y + 13);

    doc.setFont('helvetica', 'normal');
    doc.setFontSize(8);
    doc.setTextColor(...muted);
    const klantAdres = document.getElementById('klant-adres').value;
    const klantPost = document.getElementById('klant-postcode').value;
    const klantEmail = document.getElementById('klant-email').value;
    const klantTel = document.getElementById('klant-telefoon').value;
    if (klantAdres) doc.text(klantAdres, margin + 4, y + 19);
    if (klantPost) doc.text(klantPost, margin + 4, y + 25);
    if (klantEmail) doc.text(klantEmail, margin + 4, y + 31);

    // Projectomschrijving blok
    const omschrijving = document.getElementById('offerte-omschrijving').value;
    if (omschrijving) {
      doc.setFillColor(35, 35, 35);
      doc.roundedRect(margin + 84, y, W - margin - 84 - margin, 36, 2, 2, 'F');
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(7);
      doc.setTextColor(...orange);
      doc.text('PROJECTOMSCHRIJVING', margin + 88, y + 6);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(8);
      doc.setTextColor(...light);
      const lines = doc.splitTextToSize(omschrijving, W - margin - 88 - margin - 4);
      doc.text(lines.slice(0,3), margin + 88, y + 13);
    }

    // Tabel header
    y = 108;
    doc.setFillColor(...orange);
    doc.rect(margin, y, W - margin * 2, 8, 'F');
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(8);
    doc.setTextColor(255, 255, 255);

    const col1 = margin + 2;
    const col2 = margin + 100;
    const col3 = margin + 122;
    const col4 = margin + 147;
    const colW = W - margin * 2;

    doc.text('Omschrijving', col1, y + 5.5);
    doc.text('Aantal', col2, y + 5.5, { align: 'right' });
    doc.text('Eenheidsprijs', col3, y + 5.5);
    doc.text('Totaal', W - margin - 2, y + 5.5, { align: 'right' });

    y += 8;

    // Regelitems
    const rows = document.querySelectorAll('.regel-row');
    let subtotaal = 0;
    let rowIndex = 0;

    rows.forEach(row => {
      const inputs = row.querySelectorAll('input');
      const omschr = inputs[0].value || '—';
      const aantal = parseFloat(inputs[1].value) || 0;
      const prijs = parseFloat(inputs[2].value) || 0;
      const totaal = aantal * prijs;
      subtotaal += totaal;

      doc.setFillColor(rowIndex % 2 === 0 ? 38 : 32, rowIndex % 2 === 0 ? 38 : 32, rowIndex % 2 === 0 ? 38 : 32);
      doc.rect(margin, y, colW, 8, 'F');

      doc.setFont('helvetica', 'normal');
      doc.setFontSize(9);
      doc.setTextColor(...light);
      doc.text(omschr, col1, y + 5.5);
      doc.setTextColor(...muted);
      doc.text(String(aantal), col2, y + 5.5, { align: 'right' });
      doc.text('€ ' + prijs.toFixed(2), col3, y + 5.5);
      doc.setTextColor(...light);
      doc.text('€ ' + totaal.toFixed(2), W - margin - 2, y + 5.5, { align: 'right' });

      y += 8;
      rowIndex++;
    });

    // Totalen
    y += 4;
    const btw = subtotaal * 0.21;
    const totaal = subtotaal + btw;

    doc.setDrawColor(60, 60, 60);
    doc.line(margin + 90, y, W - margin, y);
    y += 6;

    doc.setFont('helvetica', 'normal');
    doc.setFontSize(9);
    doc.setTextColor(...muted);
    doc.text('Subtotaal', W - margin - 45, y);
    doc.text('€ ' + subtotaal.toFixed(2), W - margin - 2, y, { align: 'right' });
    y += 7;
    doc.text('BTW 21%', W - margin - 45, y);
    doc.text('€ ' + btw.toFixed(2), W - margin - 2, y, { align: 'right' });
    y += 3;
    doc.setDrawColor(...orange);
    doc.line(W - margin - 60, y, W - margin, y);
    y += 6;
    doc.setFillColor(...orange);
    doc.rect(W - margin - 62, y - 5, 62, 10, 'F');
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(10);
    doc.setTextColor(255, 255, 255);
    doc.text('TOTAAL INCL. BTW', W - margin - 60, y + 2);
    doc.setFontSize(12);
    doc.text('€ ' + totaal.toFixed(2), W - margin - 2, y + 2, { align: 'right' });

    // Opmerkingen
    const opmerkingen = document.getElementById('opmerkingen').value;
    if (opmerkingen) {
      y += 20;
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(7);
      doc.setTextColor(...orange);
      doc.text('OPMERKINGEN', margin, y);
      y += 5;
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(8);
      doc.setTextColor(...muted);
      const opLines = doc.splitTextToSize(opmerkingen, W - margin * 2);
      doc.text(opLines, margin, y);
    }

    // Footer
    doc.setFillColor(...mid);
    doc.rect(0, H - 16, W, 16, 'F');
    doc.setFillColor(...orange);
    doc.rect(0, H - 16, W, 1.5, 'F');
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(7);
    doc.setTextColor(...muted);
    doc.text('Duiven Installatie & Service  |  Koolmeesstraat 4, 6921 KK Duiven  |  KVK: 99908700', W / 2, H - 7, { align: 'center' });

    // Download
    const naam = document.getElementById('klant-naam').value.replace(/\s+/g, '_') || 'klant';
    doc.save(`Offerte_Duiven_${naam}_${ofNr}.pdf`);
  }
</script>
</body>
</html>
